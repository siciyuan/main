<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 家用导航</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://fastly.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Vue.js -->
    <script src="https://fastly.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <!-- 配置文件 -->
    <script src="js/config.js"></script>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #1a202c;
            margin: 0;
            padding: 0;
            color: white;
        }
        
        .settings-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .back-button {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 100;
        }
    </style>
</head>
<body>
    <!-- 返回按钮 -->
    <button class="back-button bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded transition-all"
            onclick="window.location.href='index.html'">
        <i class="fa fa-arrow-left mr-2"></i>返回主页
    </button>

    <!-- 设置容器 -->
    <div class="settings-container">
        <div id="app">
            <!-- 标题 -->
            <h1 class="text-3xl font-bold mb-8 text-center">系统设置</h1>
            
            <!-- 密码验证界面 -->
            <div v-if="settingsStep === 'password'" class="bg-gray-800 rounded-lg shadow-2xl p-8">
                <h3 class="text-2xl font-bold mb-6 text-center">管理员登录</h3>
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">管理员用户名</label>
                    <input type="text" v-model="adminUsername" 
                           class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="请输入用户名" @keyup.enter="verifyPassword">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-semibold mb-2">管理员密码</label>
                    <input type="password" v-model="adminPassword" 
                           class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="请输入密码" @keyup.enter="verifyPassword">
                </div>
                <div class="text-red-400 mb-4" v-if="passwordError">{{ passwordError }}</div>
                <div class="flex justify-between">
                    <button @click="goBack" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded transition-all">
                        取消
                    </button>
                    <button @click="verifyPassword" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition-all">
                        登录
                    </button>
                </div>
            </div>
            
            <!-- 设置功能界面 -->
            <div v-else-if="settingsStep === 'settings'" class="space-y-8">
                <!-- 分类管理 -->
                <div class="bg-gray-800 rounded-lg shadow-2xl p-8">
                    <h4 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">分类管理</h4>
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-2">添加新分类</label>
                        <div class="flex gap-2">
                            <input type="text" v-model="newCategory.name" 
                                   class="flex-1 p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   placeholder="分类名称">
                            <button @click="addCategory" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded transition-all">
                                添加
                            </button>
                        </div>
                    </div>
                    
                    <!-- 分类列表 -->
                    <div class="space-y-2">
                        <div v-for="category in categories" :key="category.id" class="flex items-center justify-between bg-gray-700 p-3 rounded-lg">
                            <span class="font-medium">{{ category.name }}</span>
                            <div class="flex gap-2">
                                <button @click="editCategory(category)" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm transition-all">
                                    <i class="fa fa-pencil"></i>
                                </button>
                                <button @click="deleteCategory(category.id)" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm transition-all">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 项目管理 -->
                <div class="bg-gray-800 rounded-lg shadow-2xl p-8">
                    <h4 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">项目管理</h4>
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-2">选择分类</label>
                        <select v-model="selectedCategory" class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
                            <option value="">请选择分类</option>
                            <option v-for="category in categories" :key="category.id" :value="category.id">{{ category.name }}</option>
                        </select>
                        
                        <div v-if="selectedCategory">
                            <h5 class="text-lg font-medium mb-3">{{ getCategoryName(selectedCategory) }} - 添加新项目</h5>
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-semibold mb-1">项目名称</label>
                                    <input type="text" v-model="newItem.name" 
                                           class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                           placeholder="项目名称">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold mb-1">链接类型</label>
                                    <select v-model="newItem.link_type" 
                                            class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="absolute">绝对路径 (https://)</option>
                                        <option value="relative">相对路径 (video/xxx.mp4)</option>
                                        <option value="local">本地路径 (/video/xxx.mp4)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold mb-1">链接</label>
                                    <input type="text" v-model="newItem.link" 
                                           class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                           :placeholder="newItem.link_type === 'absolute' ? 'https://example.com' : newItem.link_type === 'relative' ? 'video/xxx.mp4' : '/video/xxx.mp4'">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold mb-1">图标类型</label>
                                    <select v-model="newItem.icon_type" 
                                            class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="fontawesome">Font Awesome图标</option>
                                        <option value="text">文字图标</option>
                                        <option value="image">图片图标</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold mb-1">
                                        {{ newItem.icon_type === 'fontawesome' ? '图标类名' : newItem.icon_type === 'text' ? '图标文字' : '图片URL' }}
                                    </label>
                                    <input type="text" v-model="newItem.icon_value" 
                                           class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                           :placeholder="newItem.icon_type === 'fontawesome' ? 'fa-home' : newItem.icon_type === 'text' ? '首页' : 'https://example.com/icon.png'">
                                </div>
                            </div>
                            <button @click="addItem" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded transition-all">
                                添加项目
                            </button>
                        </div>
                    </div>
                    
                    <!-- 项目列表 -->
                    <div v-if="selectedCategory" class="mt-6">
                        <h5 class="text-lg font-medium mb-3">{{ getCategoryName(selectedCategory) }} - 项目列表</h5>
                        <div class="space-y-2 max-h-60 overflow-y-auto">
                            <div v-for="item in getItemsByCategory(selectedCategory)" :key="item.id" class="flex items-center justify-between bg-gray-700 p-3 rounded-lg">
                                <div class="flex items-center">
                                    <!-- 处理不同类型的图标 -->
                                    <div v-if="item.icon_type === 'fontawesome'" class="text-xl mr-3">
                                        <i :class="'fa ' + item.icon_value"></i>
                                    </div>
                                    <div v-else-if="item.icon_type === 'text'" class="text-xl mr-3 font-bold">
                                        {{ item.icon_value }}
                                    </div>
                                    <div v-else-if="item.icon_type === 'image'" class="mr-3">
                                        <img :src="getIconPath(item.icon_value)" :alt="item.name" class="w-8 h-8 rounded">
                                    </div>
                                    <div v-else class="text-xl mr-3">
                                        <i class="fa fa-question"></i>
                                    </div>
                                    <div>
                                        <span class="font-medium">{{ item.name }}</span>
                                        <div class="text-xs text-gray-400 truncate">{{ item.link }}</div>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button @click="editItem(item)" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm transition-all">
                                        <i class="fa fa-pencil"></i>
                                    </button>
                                    <button @click="deleteItem(item.id)" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm transition-all">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="text-center text-gray-400 py-4" v-if="getItemsByCategory(selectedCategory).length === 0">
                                该分类下暂无项目
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 系统设置 -->
                <div class="bg-gray-800 rounded-lg shadow-2xl p-8">
                    <h4 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">系统设置</h4>
                    <div class="flex justify-between items-center mb-4">
                        <span>粒子效果</span>
                        <button @click="toggleParticles" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded transition-all">
                            {{ config.particles.enable ? '关闭' : '开启' }}
                        </button>
                    </div>
                    <div class="flex justify-between items-center mb-4">
                        <span>点击效果</span>
                        <button @click="toggleClickEffect" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded transition-all">
                            {{ config.effects.click.enable ? '关闭' : '开启' }}
                        </button>
                    </div>
                    
                    <!-- 主题设置 -->
                    <div class="mb-6">
                        <h5 class="text-lg font-medium mb-3">主题设置</h5>
                        <div class="grid grid-cols-5 gap-3">
                            <button 
                                v-for="theme in themes" 
                                :key="theme.id" 
                                @click="selectTheme(theme.id)"
                                :class="[
                                    'py-2 px-3 rounded transition-all',
                                    selectedTheme === theme.id ? 'ring-2 ring-offset-2 ring-blue-500' : 'opacity-80 hover:opacity-100'
                                ]"
                                :style="{
                                    backgroundColor: theme.color,
                                    color: theme.textColor
                                }"
                            >
                                {{ theme.name }}
                            </button>
                        </div>
                    </div>
                    
                    <!-- 背景设置 -->
                    <div class="mb-4">
                        <h5 class="text-lg font-medium mb-3">背景设置</h5>
                        <div class="flex gap-4">
                            <button @click="setBackground('particles')" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded transition-all">
                                粒子背景
                            </button>
                            <button @click="setBackground('solid')" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded transition-all">
                                纯色背景
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 操作按钮 -->
                <div class="flex justify-between">
                    <button @click="goBack" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded transition-all">
                        返回主页
                    </button>
                    <button @click="resetPassword" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition-all">
                        重新登录
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 项目编辑模态框 -->
    <div id="edit-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999;">
        <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
        <div style="background: #2d3748; border-radius: 8px; padding: 20px; max-width: 500px; width: 90%;">
            <h3 style="color: white; text-align: center; margin-bottom: 20px;">编辑项目</h3>
            
            <div style="margin-bottom: 15px;">
                <label style="color: white; display: block; margin-bottom: 5px;">项目名称</label>
                <input type="text" id="edit-name" style="width: 100%; padding: 8px; border: 1px solid #4a5568; border-radius: 4px; background: #1a202c; color: white;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="color: white; display: block; margin-bottom: 5px;">链接</label>
                <input type="text" id="edit-link" style="width: 100%; padding: 8px; border: 1px solid #4a5568; border-radius: 4px; background: #1a202c; color: white;">
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="color: white; display: block; margin-bottom: 5px;">图标类型</label>
                <select id="edit-icon-type" style="width: 100%; padding: 8px; border: 1px solid #4a5568; border-radius: 4px; background: #1a202c; color: white;">
                    <option value="fontawesome">Font Awesome</option>
                    <option value="text">文字</option>
                    <option value="image">图片</option>
                </select>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="color: white; display: block; margin-bottom: 5px;" id="edit-icon-label">图标类名</label>
                <input type="text" id="edit-icon-value" style="width: 100%; padding: 8px; border: 1px solid #4a5568; border-radius: 4px; background: #1a202c; color: white;">
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button onclick="closeEditModal()" style="padding: 8px 16px; background: #4a5568; color: white; border: none; border-radius: 4px; cursor: pointer;">取消</button>
                <button onclick="saveItemEdit()" style="padding: 8px 16px; background: #3182ce; color: white; border: none; border-radius: 4px; cursor: pointer;">保存</button>
            </div>
        </div>
        </div>
    </div>

    <script>
        // Vue.js应用
        window.app = new Vue({
            el: '#app',
            data: {
                categories: [],
                items: [],
                // 系统配置
                config: window.config || {
                    particles: {
                        enable: true
                    },
                    effects: {
                        click: {
                            enable: true
                        }
                    }
                },
                // 设置功能相关数据
                settingsStep: 'password', // password或settings
                adminUsername: '',
                adminPassword: '',
                passwordError: '',
                newCategory: {
                    name: '',
                    order_num: 0
                },
                selectedCategory: '',
                newItem: {
                    name: '',
                    link: '',
                    link_type: 'absolute',
                    icon_type: 'fontawesome',
                    icon_value: 'fa-link',
                    link_target: '_blank',
                    order_num: 0
                },
                // 主题相关数据
                themes: [
                    { id: 'default', name: '默认', color: '#1a202c', textColor: '#ffffff' },
                    { id: 'light', name: '亮白', color: '#f7fafc', textColor: '#1a202c' },
                    { id: 'lime', name: '青柠', color: '#48bb78', textColor: '#ffffff' },
                    { id: 'lemon', name: '柠檬黄', color: '#ecc94b', textColor: '#1a202c' },
                    { id: 'cherry', name: '樱红', color: '#f56565', textColor: '#ffffff' },
                    { id: 'aqua', name: '水蓝', color: '#4299e1', textColor: '#ffffff' },
                    { id: 'apple-green', name: '苹果绿', color: '#38a169', textColor: '#ffffff' },
                    { id: 'purple', name: '紫色', color: '#9f7aea', textColor: '#ffffff' },
                    { id: 'orange', name: '橙色', color: '#ed8936', textColor: '#ffffff' },
                    { id: 'teal', name: '青色', color: '#3182ce', textColor: '#ffffff' },
                    { id: 'dark-blue', name: '深蓝', color: '#2c5282', textColor: '#ffffff' },
                    { id: 'pink', name: '粉色', color: '#ed64a6', textColor: '#ffffff' },
                    { id: 'indigo', name: '靛蓝', color: '#667eea', textColor: '#ffffff' },
                    { id: 'amber', name: '琥珀', color: '#ed8936', textColor: '#ffffff' },
                    { id: 'emerald', name: '翡翠', color: '#38a169', textColor: '#ffffff' },
                    { id: 'rose', name: '玫瑰', color: '#f56565', textColor: '#ffffff' },
                    { id: 'violet', name: '紫罗兰', color: '#805ad5', textColor: '#ffffff' },
                    { id: 'cyan', name: '蓝绿', color: '#0bc5ea', textColor: '#ffffff' },
                    { id: 'gray', name: '灰色', color: '#4a5568', textColor: '#ffffff' },
                    { id: 'green', name: '绿色', color: '#38a169', textColor: '#ffffff' }
                ],
                selectedTheme: 'default',
                backgroundType: 'particles' // particles或solid
            },
            mounted() {
                this.fetchData();
                
                // 加载保存的主题设置
                const savedTheme = localStorage.getItem('selectedTheme');
                const savedBackgroundType = localStorage.getItem('backgroundType');
                
                if (savedTheme) {
                    this.selectedTheme = savedTheme;
                    this.applyTheme(savedTheme);
                }
                
                if (savedBackgroundType) {
                    this.backgroundType = savedBackgroundType;
                    this.setBackground(savedBackgroundType);
                }
            },
            methods: {
                // 获取数据
                fetchData() {
                    // 获取分类
                    fetch(config.api.baseUrl + '?action=getCategories')
                        .then(response => response.json())
                        .then(data => {
                            // 确保分类是数组
                            this.categories = Array.isArray(data) ? data : [];
                            console.log('加载了', this.categories.length, '个分类');
                            // 在分类加载完成后再获取项目
                            this.fetchItemsByCategories();
                        })
                        .catch(error => {
                            console.error('获取分类失败:', error);
                            console.warn('请确保通过Web服务器访问此页面，而不是直接打开HTML文件');
                            this.categories = [];
                        });
                },
                
                // 根据分类获取项目
                fetchItemsByCategories() {
                    this.items = [];
                    
                    // 如果没有分类，直接返回
                    if (this.categories.length === 0) {
                        return;
                    }
                    
                    this.categories.forEach(category => {
                        fetch(config.api.baseUrl + '?action=getItems&category_id=' + encodeURIComponent(category.id))
                            .then(response => response.json())
                            .then(data => {
                                if (Array.isArray(data)) {
                                    // 清理和修复项目数据
                                    const cleanedItems = data.map(item => {
                                        // 确保所有必要字段都存在
                                        return {
                                            id: item.id || '',
                                            category_id: item.category_id || '',
                                            name: item.name || '未命名',
                                            icon_type: item.icon_type || 'fontawesome',
                                            icon_value: item.icon_value || 'fa-link',
                                            link: item.link || '',
                                            link_type: item.link_type || 'absolute',
                                            link_target: item.link_target || '_blank'
                                        };
                                    });
                                    
                                    this.items = this.items.concat(cleanedItems);
                                }
                            })
                            .catch(error => {
                                console.error('获取分类', category.name, '的项目失败:', error);
                            });
                    });
                },
                
                // 根据分类ID获取项目
                getItemsByCategory(categoryId) {
                    // 确保this.items是数组后再调用filter
                    if (!Array.isArray(this.items)) {
                        return [];
                    }
                    
                    // 确保类型匹配，使用严格相等比较
                    return this.items.filter(item => {
                        const itemCatId = String(item.category_id);
                        const targetCatId = String(categoryId);
                        return itemCatId === targetCatId;
                    });
                },
                
                // 根据ID获取分类名称
                getCategoryName(categoryId) {
                    const category = this.categories.find(cat => String(cat.id) === String(categoryId));
                    return category ? category.name : '未知分类';
                },
                
                // 验证管理员密码
                verifyPassword() {
                    // 从配置文件获取管理员凭据
                    const adminConfig = window.config?.admin || { username: 'admin', password: 'admin123' };
                    
                    if (this.adminUsername === adminConfig.username && this.adminPassword === adminConfig.password) {
                        this.passwordError = '';
                        this.settingsStep = 'settings';
                    } else {
                        this.passwordError = '用户名或密码错误，请重试';
                    }
                },
                
                // 重置密码验证
                resetPassword() {
                    this.settingsStep = 'password';
                    this.adminUsername = '';
                    this.adminPassword = '';
                    this.passwordError = '';
                },
                
                // 返回主页
                goBack() {
                    window.location.href = 'index.html';
                },
                
                // 添加分类
                addCategory() {
                    if (!this.newCategory.name.trim()) {
                        alert('分类名称不能为空');
                        return;
                    }
                    
                    // 准备请求数据
                    const formData = new FormData();
                    formData.append('action', 'addCategory');
                    formData.append('name', this.newCategory.name.trim());
                    
                    // 发送请求
                    fetch(config.api.baseUrl, {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // 重新获取分类列表
                            this.fetchData();
                            // 重置表单
                            this.newCategory = {
                                name: '',
                                order_num: 0
                            };
                            alert('分类添加成功');
                        } else {
                            alert('添加失败: ' + (data.error || '未知错误'));
                        }
                    })
                    .catch(error => {
                        console.error('添加分类失败:', error);
                        alert('添加失败，请稍后重试');
                    });
                },
                
                // 编辑分类
                editCategory(category) {
                    const newName = prompt('请输入新的分类名称:', category.name);
                    if (newName && newName.trim() !== category.name) {
                        // 准备请求数据
                        const formData = new FormData();
                        formData.append('action', 'updateCategory');
                        formData.append('id', category.id);
                        formData.append('name', newName.trim());
                        
                        // 发送请求
                        fetch(config.api.baseUrl, {
                            method: 'POST',
                            body: formData
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                // 重新获取分类列表
                                this.fetchData();
                                alert('分类更新成功');
                            } else {
                                alert('更新失败: ' + (data.error || '未知错误'));
                            }
                        })
                        .catch(error => {
                            console.error('更新分类失败:', error);
                            alert('更新失败，请稍后重试');
                        });
                    }
                },
                
                // 删除分类
                deleteCategory(categoryId) {
                    if (confirm('确定要删除这个分类吗？分类下的所有项目也会被删除。')) {
                        // 准备请求数据
                        const formData = new FormData();
                        formData.append('action', 'deleteCategory');
                        formData.append('id', categoryId);
                        
                        // 发送请求
                        fetch(config.api.baseUrl, {
                            method: 'POST',
                            body: formData
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                // 重新获取分类和项目列表
                                this.fetchData();
                                // 如果当前选中的是被删除的分类，重置选择
                                if (String(this.selectedCategory) === String(categoryId)) {
                                    this.selectedCategory = '';
                                }
                                alert('分类删除成功');
                            } else {
                                alert('删除失败: ' + (data.error || '未知错误'));
                            }
                        })
                        .catch(error => {
                            console.error('删除分类失败:', error);
                            alert('删除失败，请稍后重试');
                        });
                    }
                },
                
                // 编辑项目
                editItem(item) {
                    // 存储当前编辑的项目信息
                    window.currentEditItem = item;
                    
                    // 填充编辑表单
                    document.getElementById('edit-name').value = item.name || '';
                    document.getElementById('edit-link').value = item.link || '';
                    document.getElementById('edit-icon-type').value = item.icon_type || 'fontawesome';
                    document.getElementById('edit-icon-value').value = item.icon_value || 'fa-link';
                    
                    // 更新图标标签
                    updateIconLabel();
                    
                    // 打开编辑模态框
                    document.getElementById('edit-modal').style.display = 'block';
                },
                
                // 添加项目
                addItem() {
                    if (!this.selectedCategory) {
                        alert('请先选择一个分类');
                        return;
                    }
                    
                    if (!this.newItem.name.trim()) {
                        alert('项目名称不能为空');
                        return;
                    }
                    
                    if (!this.newItem.link.trim()) {
                        alert('项目链接不能为空');
                        return;
                    }
                    
                    // 准备请求数据
                    const formData = new FormData();
                    formData.append('action', 'addItem');
                    formData.append('category_id', this.selectedCategory);
                    formData.append('name', this.newItem.name.trim());
                    formData.append('icon_type', this.newItem.icon_type);
                    formData.append('icon_value', this.newItem.icon_value);
                    formData.append('link', this.newItem.link.trim());
                    formData.append('link_type', this.newItem.link_type);
                    formData.append('link_target', this.newItem.link_target);
                    
                    // 发送请求
                    fetch(config.api.baseUrl, {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // 重新获取项目列表
                            this.fetchItemsByCategories();
                            // 重置表单
                            this.newItem = {
                                name: '',
                                link: '',
                                link_type: 'absolute',
                                icon_type: 'fontawesome',
                                icon_value: 'fa-link',
                                link_target: '_blank',
                                order_num: 0
                            };
                            alert('项目添加成功');
                        } else {
                            alert('添加失败: ' + (data.error || '未知错误'));
                        }
                    })
                    .catch(error => {
                        console.error('添加项目失败:', error);
                        alert('添加失败，请稍后重试');
                    });
                },
                
                // 删除项目
                deleteItem(itemId) {
                    if (confirm('确定要删除这个项目吗？')) {
                        // 准备请求数据
                        const formData = new FormData();
                        formData.append('action', 'deleteItem');
                        formData.append('id', itemId);
                        
                        // 发送请求
                        fetch(config.api.baseUrl, {
                            method: 'POST',
                            body: formData
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                // 重新获取项目列表
                                this.fetchItemsByCategories();
                                alert('项目删除成功');
                            } else {
                                alert('删除失败: ' + (data.error || '未知错误'));
                            }
                        })
                        .catch(error => {
                            console.error('删除项目失败:', error);
                            alert('删除失败，请稍后重试');
                        });
                    }
                },
                
                // 切换粒子效果
                toggleParticles() {
                    config.particles.enable = !config.particles.enable;
                },
                
                // 切换点击效果
                toggleClickEffect() {
                    config.effects.click.enable = !config.effects.click.enable;
                },
                
                // 选择主题
                selectTheme(themeId) {
                    this.selectedTheme = themeId;
                    this.applyTheme(themeId);
                    // 保存主题到localStorage
                    localStorage.setItem('selectedTheme', themeId);
                    localStorage.setItem('backgroundType', this.backgroundType);
                },
                
                // 应用主题
                applyTheme(themeId) {
                    const theme = this.themes.find(t => t.id === themeId);
                    if (theme) {
                        // 应用背景颜色
                        document.body.style.background = theme.color;
                        
                        // 更新标题颜色
                        const title = document.querySelector('h1');
                        if (title) {
                            title.style.color = theme.textColor;
                        }
                    }
                },
                
                // 设置背景
                setBackground(type) {
                    this.backgroundType = type;
                    
                    // 保存设置到localStorage
                    localStorage.setItem('backgroundType', type);
                },
                
                // 获取图标路径
                getIconPath(iconValue) {
                    if (!iconValue) return '';
                    
                    // 绝对路径：直接返回
                    if (iconValue.startsWith('http://') || iconValue.startsWith('https://')) {
                        return iconValue;
                    }
                    
                    // 本地路径：/images/icon.png → http://localhost/images/icon.png
                    if (iconValue.startsWith('/')) {
                        return window.location.origin + iconValue;
                    }
                    
                    // 相对路径：images/icon.png → http://localhost/test/images/icon.png
                    const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/');
                    return baseUrl + iconValue;
                }
            }
        });
        
        // 更新图标标签
        function updateIconLabel() {
            const iconType = document.getElementById('edit-icon-type').value;
            const labelElement = document.getElementById('edit-icon-label');
            
            if (iconType === 'fontawesome') {
                labelElement.textContent = '图标类名';
            } else if (iconType === 'text') {
                labelElement.textContent = '文字';
            } else if (iconType === 'image') {
                labelElement.textContent = '图片路径';
            }
        }
        
        // 关闭编辑模态框
        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }
        
        // 保存项目编辑
        function saveItemEdit() {
            const item = window.currentEditItem;
            if (!item) return;
            
            const name = document.getElementById('edit-name').value.trim();
            const link = document.getElementById('edit-link').value.trim();
            const iconType = document.getElementById('edit-icon-type').value;
            const iconValue = document.getElementById('edit-icon-value').value;
            
            if (!name) {
                alert('项目名称不能为空');
                return;
            }
            
            if (!link) {
                alert('项目链接不能为空');
                return;
            }
            
            // 准备请求数据
            const formData = new FormData();
            formData.append('action', 'updateItem');
            formData.append('id', item.id);
            formData.append('category_id', item.category_id);
            formData.append('name', name);
            formData.append('link', link);
            formData.append('link_type', item.link_type || 'absolute');
            formData.append('icon_type', iconType);
            formData.append('icon_value', iconValue);
            formData.append('link_target', item.link_target || '_blank');
            formData.append('order_num', item.order_num || 0);
            
            // 发送请求
            fetch(config.api.baseUrl, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 重新获取项目列表
                    window.app.fetchItemsByCategories();
                    closeEditModal();
                    alert('项目更新成功');
                } else {
                    alert('更新失败: ' + (data.error || '未知错误'));
                }
            })
            .catch(error => {
                console.error('更新项目失败:', error);
                alert('更新失败，请稍后重试');
            });
        }
        
        // 绑定图标类型变更事件
        document.addEventListener('DOMContentLoaded', function() {
            const iconTypeSelect = document.getElementById('edit-icon-type');
            if (iconTypeSelect) {
                iconTypeSelect.addEventListener('change', updateIconLabel);
            }
        });
    </script>
</body>
</html>
