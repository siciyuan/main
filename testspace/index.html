<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 开屏动画 -->
    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo">
                <i class="fas fa-user-circle"></i>
            </div>
            <h1 id="splash-title">加载中...</h1>
        </div>
    </div>

    <!-- 主容器 -->
    <div id="app">
        <!-- 导航栏 -->
        <nav class="glass-card">
            <div class="container">
                <div class="nav-content">
                    <div class="logo" id="nav-logo">
                        <i class="fas fa-user-circle"></i>
                        <span id="nav-title">个人主页</span>
                    </div>
                    <div class="nav-right">
                        <ul class="nav-links" id="nav-links">
                            <li><a href="#about"><i class="fas fa-user"></i> 关于</a></li>
                            <li><a href="#projects"><i class="fas fa-code"></i> 项目</a></li>
                            <li><a href="#contact"><i class="fas fa-envelope"></i> 联系</a></li>
                        </ul>
                        <div class="theme-selector glass-card" id="theme-selector">
                            <select id="theme-dropdown">
                                <option value="default">默认</option>
                                <option value="light">亮白</option>
                                <option value="lime">青柠</option>
                                <option value="lemon">柠黄</option>
                                <option value="apple">苹果绿</option>
                                <option value="water">水蓝</option>
                                <option value="cherry">樱红</option>
                                <option value="lavender">薰衣草紫</option>
                                <option value="graphite">石墨黑</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 英雄区域 -->
        <section class="hero">
            <div class="container">
                <div class="glass-card hero-card">
                    <div class="hero-content">
                        <h1 id="hero-title">你好，我是 <span id="hero-name">开发者</span></h1>
                        <p id="hero-subtitle">专注于前端开发和用户体验设计</p>
                        <div class="hero-buttons">
                            <a href="#projects" class="btn primary" id="hero-btn-1">查看项目</a>
                            <a href="#contact" class="btn secondary" id="hero-btn-2">联系我</a>
                        </div>
                    </div>
                    <div class="hero-avatar">
                        <div class="avatar glass-card" id="hero-avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 关于部分 -->
        <section id="about" class="section">
            <div class="container">
                <h2 class="section-title"><i class="fas fa-user"></i> 关于我</h2>
                <div class="glass-card about-card">
                    <p id="about-content">我是一名前端开发者，热爱创造美观且功能强大的网页应用。我擅长使用现代前端技术栈，包括HTML5、CSS3、JavaScript、Vue.js等。我注重用户体验，致力于构建响应式、高性能的网站。</p>
                    <div class="skills">
                        <h3>技能</h3>
                        <div class="skill-list" id="skills-list">
                            <div class="skill-item glass-card">
                                <i class="fab fa-html5"></i>
                                <span>HTML5</span>
                            </div>
                            <div class="skill-item glass-card">
                                <i class="fab fa-css3-alt"></i>
                                <span>CSS3</span>
                            </div>
                            <div class="skill-item glass-card">
                                <i class="fab fa-js"></i>
                                <span>JavaScript</span>
                            </div>
                            <div class="skill-item glass-card">
                                <i class="fab fa-vuejs"></i>
                                <span>Vue.js</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 项目部分 -->
        <section id="projects" class="section">
            <div class="container">
                <h2 class="section-title"><i class="fas fa-code"></i> 我的项目</h2>
                <div class="projects-grid" id="projects-grid">
                    <!-- 项目卡片将通过config.js动态生成 -->
                </div>
            </div>
        </section>

        <!-- 联系部分 -->
        <section id="contact" class="section">
            <div class="container">
                <h2 class="section-title"><i class="fas fa-envelope"></i> 联系我</h2>
                <div class="glass-card contact-card">
                    <div class="contact-info" id="contact-info">
                        <div class="contact-item">
                            <i class="fas fa-envelope"></i>
                            <span>email@example.com</span>
                        </div>
                        <div class="contact-item">
                            <i class="fas fa-phone"></i>
                            <span>+86 123 4567 8910</span>
                        </div>
                        <div class="contact-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>北京市朝阳区</span>
                        </div>
                    </div>
                    <div class="social-links" id="social-links">
                        <a href="#" class="social-link glass-card">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="#" class="social-link glass-card">
                            <i class="fab fa-twitter"></i>
                        </a>
                        <a href="#" class="social-link glass-card">
                            <i class="fab fa-linkedin"></i>
                        </a>
                        <a href="#" class="social-link glass-card">
                            <i class="fab fa-instagram"></i>
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <!-- 友情链接 -->
        <section id="friends" class="section">
            <div class="container">
                <h2 class="section-title"><i class="fas fa-link"></i> 友情链接</h2>
                <div class="glass-card friends-card">
                    <div class="friends-list" id="friends-list">
                        <!-- 友情链接将通过config.js动态生成 -->
                    </div>
                </div>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="glass-card">
            <div class="container">
                <p id="footer-text">© 2024 个人主页. 保留所有权利.</p>
            </div>
        </footer>
    </div>

    <!-- 脚本 -->
    <script src="config.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="script.js"></script>
    <script src="mouse-effect.js"></script>
    <script src="snake-game.js"></script>
</body>
</html>
